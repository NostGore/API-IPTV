<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: system-ui, sans-serif; }
.player-wrap { position: relative; width: 100vw; height: 100vh; background: #000; }
video { width: 100%; height: 100%; object-fit: contain; display: block; }

.controls {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  padding: 40px 20px 16px; opacity: 0; transition: opacity 0.3s; z-index: 10;
}
.player-wrap:hover .controls, .controls.visible { opacity: 1; }
.controls-inner { display: flex; align-items: center; gap: 12px; max-width: 1000px; margin: 0 auto; }

.live-badge { display: flex; align-items: center; gap: 6px; color: #e53935; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; user-select: none; flex-shrink: 0; }
.live-dot { width: 8px; height: 8px; background: #e53935; border-radius: 50%; animation: live-pulse 1.5s ease-in-out infinite; }
@keyframes live-pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.85); } }

.btn { background: none; border: none; color: #fff; cursor: pointer; padding: 6px; display: flex; align-items: center; justify-content: center; opacity: 0.85; transition: opacity 0.2s, transform 0.1s; flex-shrink: 0; }
.btn:hover { opacity: 1; }
.btn:active { transform: scale(0.9); }

.vol-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.vol-slider { width: 0; overflow: hidden; transition: width 0.2s; height: 4px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.25); border-radius: 50px; outline: none; cursor: pointer; }
.vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #e53935; border-radius: 50%; cursor: pointer; }
.vol-wrap:hover .vol-slider { width: 70px; }

.big-play {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 80px; height: 80px; background: rgba(107,32,32,0.85); border: none; border-radius: 50%;
  color: #fff; cursor: pointer; font-size: 36px; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.2s; z-index: 5; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.big-play:hover { background: #8b2a2a; transform: translate(-50%, -50%) scale(1.05); }
.big-play.hidden { display: none; }

.buffer-indicator { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 4; }
.spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #e53935; border-radius: 50%; animation: spin 0.8s linear infinite; }
.spinner.hidden { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }


</style>
</head>
<body>
<div class="player-wrap" id="wrap">
  <video id="video" autoplay preload="auto" crossorigin="anonymous" playsinline></video>
  <div class="buffer-indicator" id="spinner" style="display:none"><div class="spinner"></div></div>
  <button class="big-play" id="bigPlay">&#9654;</button>
  <div class="controls" id="controls">
    <div class="controls-inner">
      <span class="live-badge"><span class="live-dot"></span> Live</span>
      <div class="vol-wrap">
        <button class="btn" id="muteBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.05" value="1">
      </div>
      <button class="btn" id="fullBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
(function() {
  var v = document.getElementById('video');
  var wrap = document.getElementById('wrap');
  var controls = document.getElementById('controls');
  var bigPlay = document.getElementById('bigPlay');
  var spinner = document.getElementById('spinner');
  var muteBtn = document.getElementById('muteBtn');
  var volSlider = document.getElementById('volSlider');
  var fullBtn = document.getElementById('fullBtn');

  var slug = window.location.search.replace(/^\?=/, '');
  var u = '';

  bigPlay.addEventListener('click', function() { v.play(); });

  v.addEventListener('waiting', function() {
    clearTimeout(spinTimer);
    spinTimer = setTimeout(function() { spinner.style.display = ''; }, 500);
  });
  v.addEventListener('canplay', function() { clearTimeout(spinTimer); spinner.style.display = 'none'; });
  v.addEventListener('playing', function() { clearTimeout(spinTimer); spinner.style.display = 'none'; });
  v.addEventListener('seeking', function() { clearTimeout(spinTimer); });
  v.addEventListener('seeked', function() { clearTimeout(spinTimer); spinner.style.display = 'none'; });

  muteBtn.addEventListener('click', function() {
    v.muted = !v.muted;
    volSlider.value = v.muted ? 0 : v.volume;
  });
  volSlider.addEventListener('input', function() {
    v.volume = parseFloat(this.value);
    v.muted = v.volume === 0;
  });
  fullBtn.addEventListener('click', function() {
    if (document.fullscreenElement) { document.exitFullscreen(); }
    else { wrap.requestFullscreen(); }
  });

  var ctrlTimer;
  wrap.addEventListener('mousemove', function() {
    controls.classList.add('visible');
    clearTimeout(ctrlTimer);
    ctrlTimer = setTimeout(function() { if (!v.paused) controls.classList.remove('visible'); }, 3000);
  });

  function enterFS() { try { wrap.requestFullscreen(); } catch(e) {} }

  function play(url) {
    if (Hls.isSupported()) {
      var h = new Hls({ enableWorker: false });
      h.loadSource(url);
      h.attachMedia(v);
      h.on(Hls.Events.MANIFEST_PARSED, function() { v.play(); enterFS(); });
    } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
      v.src = url;
      v.addEventListener('loadedmetadata', function() { v.play(); enterFS(); });
    } else {
      v.src = url;
      v.addEventListener('loadedmetadata', function() { v.play(); enterFS(); });
    }
  }

  if (slug) {
    fetch('channels.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var keys = Object.keys(data);
        for (var i = 0; i < keys.length; i++) {
          var channels = data[keys[i]];
          for (var j = 0; j < channels.length; j++) {
            var ch = channels[j];
            var expected = 'tv-' + ch.codigo + '-' + ch.ruta;
            if (slug === expected) {
              document.title = ch.canal + ' - IPTV Player';
              u = ch.m3u8;
              play(u);
              return;
            }
          }
        }
      });
  }

  v.addEventListener('play', function() { enterFS(); bigPlay.classList.add('hidden'); });
  v.addEventListener('pause', function() { bigPlay.classList.remove('hidden'); });
})();
</script>
</body>
</html>
